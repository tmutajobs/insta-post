/* スライド */
.pages {
  display:flex;
  width:200%;
  height:100%;
  transition:transform 0.45s cubic-bezier(0.77,0,0.18,1);
}
.pages.show-result { transform:translateX(-50%); }
.page {
  width:50%;
  height:100%;
  overflow-y:auto;
  -webkit-overflow-scrolling:touch;
  position:relative;
  z-index:1;
}
/* PAGE 1 */
#page-input {
  display:flex;
  flex-direction:column;
  padding:0 24px 40px;
}
.header { text-align:center; padding-top:72px; padding-bottom:28px; }
.title { font-family:'Lato',sans-serif; font-weight:900; font-size:48px; letter-spacing:-1px; line-height:1; color:#111; }
.subtitle { font-family:'Lato',sans-serif; font-weight:300; font-size:14px; color:#777; margin-top:6px; }
.desc-card {
  background:rgba(255,255,255,0.6);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  border-radius:16px;
  padding:20px;
  text-align:center;
  font-size:14px;
  line-height:1.8;
  color:#555;
  margin-bottom:32px;
}
.input-section { flex:1; display:flex; flex-direction:column; gap:12px; }
.input-label { font-size:14px; color:#111; }
.store-input {
  width:100%;
  padding:18px 20px;
  border:1.5px solid #d0d0d0;
  border-radius:16px;
  background:rgba(255,255,255,0.92);
  font-size:16px;
  color:#111;
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  outline:none;
  -webkit-appearance:none;
  transition:border-color 0.2s;
}
.store-input::placeholder { color:#bbb; }
.store-input:focus { border-color:#888; }
.link-input { font-size:13px; padding:14px 16px; }
.error-msg { color:#c00; font-size:13px; text-align:center; display:none; }
.generate-btn {
  width:100%; padding:20px;
  background:#111; color:#fff;
  border:none; border-radius:16px;
  font-size:16px;
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  font-weight:500; cursor:pointer;
  transition:opacity 0.2s, transform 0.15s;
}
.generate-btn:active { transform:scale(0.98); opacity:0.85; }
.generate-btn:disabled { opacity:0.5; }
.btn-inner { display:flex; align-items:center; justify-content:center; gap:10px; }
.spinner {
  width:18px; height:18px;
  border:2px solid rgba(255,255,255,0.35);
  border-top-color:#fff;
  border-radius:50%;
  animation:spin 0.7s linear infinite;
  display:none;
}
.generating .spinner { display:block; }
@keyframes spin { to { transform:rotate(360deg); } }
/* PAGE 2 */
#page-result {
  display:flex; flex-direction:column;
  padding:0 24px 40px;
  background:#f0efed;
}
.result-header { display:flex; align-items:center; padding-top:56px; padding-bottom:20px; gap:12px; }
.back-btn {
  background:rgba(0,0,0,0.07); border:none; border-radius:50%;
  width:36px; height:36px; display:flex; align-items:center; justify-content:center;
  cursor:pointer; font-size:18px; flex-shrink:0;
}
.result-title { font-family:'Lato',sans-serif; font-weight:700; font-size:20px; }
.result-box {
  background:rgba(255,255,255,0.9);
  border-radius:16px; padding:20px; flex:1; min-height:300px;
  font-size:14px; line-height:1.85; color:#111;
  white-space:pre-wrap; word-break:break-word;
  font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  outline:none; border:1.5px solid transparent; overflow-y:auto;
}
.result-box:focus { border-color:#aaa; }
.result-actions { display:flex; gap:10px; margin-top:14px; }
.action-btn {
  flex:1; padding:16px 8px; border-radius:16px;
  font-size:14px; font-family:'Hiragino Sans','Noto Sans JP',sans-serif;
  font-weight:500; border:none; cursor:pointer;
  transition:opacity 0.2s, transform 0.15s;
}
.action-btn:active { transform:scale(0.97); opacity:0.8; }
.btn-regen { background:rgba(0,0,0,0.08); color:#111; }
.btn-copy { background:#111; color:#fff; }
.btn-copy.copied { background:#2a9d5c; }
</style>
</head>
<body>
<div class="app">
  <div id="logoBg"></div>
  <div class="pages" id="pages">

    <!-- PAGE 1 -->
    <div class="page" id="page-input">
      <div class="header">
        <div class="title">Insta Post</div>
        <div class="subtitle">by otona club</div>
      </div>
      <div class="desc-card">
        店名を入力するだけで、インスタグラムの投稿説明文を自動で作成します。<br>
        住所・営業時間・ハッシュタグまでまとめて生成。<br>
        コピーしてそのまま使えます。
      </div>
      <div class="input-section">
        <div class="input-label">お店の名前を入力してください</div>
        <input type="text" class="store-input" id="storeInput" placeholder="例：一蘭 渋谷店" autocomplete="off" autocorrect="off" spellcheck="false">
        <div class="input-label" style="margin-top:4px;">参考リンク（任意）</div>
        <input type="url" class="store-input link-input" id="link1" placeholder="参考URL 1（例：食べログのURL）" autocomplete="off">
        <input type="url" class="store-input link-input" id="link2" placeholder="参考URL 2" autocomplete="off">
        <input type="url" class="store-input link-input" id="link3" placeholder="参考URL 3" autocomplete="off">
        <div class="error-msg" id="errorMsg">エラーが発生しました。もう一度お試しください。</div>
        <button class="generate-btn" id="generateBtn">
          <div class="btn-inner">
            <div class="spinner"></div>
            <span class="btn-label">投稿文を生成する</span>
          </div>
        </button>
      </div>
    </div>

    <!-- PAGE 2 -->
    <div class="page" id="page-result">
      <div class="result-header">
        <button class="back-btn" id="backBtn">←</button>
        <div class="result-title">生成された投稿文</div>
      </div>
      <div class="result-box" id="resultBox" contenteditable="true"></div>
      <div class="result-actions">
        <button class="action-btn btn-regen" id="regenBtn">🔄 再生成</button>
        <button class="action-btn btn-copy" id="copyBtn">📋 コピー</button>
      </div>
    </div>

  </div>
</div>
<script>
var currentStore = '';

function showPage(page) {
  document.getElementById('pages').classList.toggle('show-result', page === 'result');
}

function setLoading(isLoading, text) {
  var btn = document.getElementById('generateBtn');
  var label = btn.querySelector('.btn-label');
  btn.disabled = isLoading;
  if (isLoading) {
    btn.classList.add('generating');
    label.textContent = text || '生成中…';
  } else {
    btn.classList.remove('generating');
    label.textContent = '投稿文を生成する';
  }
}

function showError(msg) {
  var el = document.getElementById('errorMsg');
  el.textContent = msg || 'エラーが発生しました。もう一度お試しください。';
  el.style.display = 'block';
}

function hideError() {
  document.getElementById('errorMsg').style.display = 'none';
}

async function fetchUrlText(url) {
  if (!url) return '';
  try {
    var res = await fetch('https://api.allorigins.win/get?url=' + encodeURIComponent(url));
    var data = await res.json();
    var html = data.contents || '';
    var text = html
      .replace(/<style[^>]*>[\s\S]*?<\/style>/gi, '')
      .replace(/<script[^>]*>[\s\S]*?<\/script>/gi, '')
      .replace(/<[^>]+>/g, ' ')
      .replace(/\s+/g, ' ')
      .trim()
      .slice(0, 3000);
    return text;
  } catch(e) { return ''; }
}

async function callAPI(storeName) {
  setLoading(true, 'URL確認中…');
  hideError();

  var link1 = document.getElementById('link1').value.trim();
  var link2 = document.getElementById('link2').value.trim();
  var link3 = document.getElementById('link3').value.trim();

  var urlContents = [];
  if (link1) { var t1 = await fetchUrlText(link1); if (t1) urlContents.push('【参考URL1の内容】\n' + t1); }
  if (link2) { var t2 = await fetchUrlText(link2); if (t2) urlContents.push('【参考URL2の内容】\n' + t2); }
  if (link3) { var t3 = await fetchUrlText(link3); if (t3) urlContents.push('【参考URL3の内容】\n' + t3); }

  setLoading(true, '生成中…');

  var systemPrompt = 'あなたは日本のグルメ情報に精通したインスタグラム投稿文の作成専門家です。提供された参考情報をもとに正確な店舗情報を記載してください。不明な情報のみ「要確認」と書いてください。';

  var userPrompt = 'お店の名前：' + storeName + '\n\n';
  if (urlContents.length > 0) {
    userPrompt += '以下の参考情報をもとに投稿文を作成してください。\n\n' + urlContents.join('\n\n') + '\n\n';
  } else {
    userPrompt += '食べログ等で公開されている情報をもとに、知っている範囲で正確に記載してください。\n\n';
  }
  userPrompt += '以下のフォーマットのみを出力してください（前置き・補足は一切不要）：\n\n';
  userPrompt += '📍 ' + storeName + '\n住所：\n最寄駅：\n電話番号：\n営業時間：月・火・水・木・金・土・日\n（各曜日の時間または定休日）\n予算：\n\n⬇️\n\n（200〜300字。絵文字は控えめに。シックで上品な文体でお店の魅力を伝える）\n\n（ハッシュタグ5個）';

  try {
    var res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 1000,
        system: systemPrompt,
        messages: [{ role: 'user', content: userPrompt }]
      })
    });

    var data = await res.json();
    if (!res.ok || !data.content) throw new Error(data.error ? data.error.message : 'error');

    var text = '';
    for (var i = 0; i < data.content.length; i++) {
      if (data.content[i].type === 'text') text += data.content[i].text;
    }
    if (!text.trim()) throw new Error('テキストが空');
    document.getElementById('resultBox').innerText = text.trim();
    showPage('result');

  } catch(err) {
    console.error(err);
    showError('エラーが発生しました。もう一度お試しください。');
  } finally {
    setLoading(false);
  }
}

document.getElementById('generateBtn').addEventListener('click', function() {
  var store = document.getElementById('storeInput').value.trim();
  if (!store) { document.getElementById('storeInput').focus(); return; }
  currentStore = store;
  callAPI(store);
});

document.getElementById('storeInput').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') {
    var store = this.value.trim();
    if (!store) return;
    currentStore = store;
    callAPI(store);
  }
});

document.getElementById('backBtn').addEventListener('click', function() { showPage('input'); });

document.getElementById('regenBtn').addEventListener('click', function() {
  if (!currentStore) return;
  showPage('input');
  callAPI(currentStore);
});

document.getElementById('copyBtn').addEventListener('click', async function() {
  var box = document.getElementById('resultBox');
  var btn = document.getElementById('copyBtn');
  try {
    await navigator.clipboard.writeText(box.innerText);
    btn.textContent = '✅ コピーしました';
    btn.classList.add('copied');
    setTimeout(function() { btn.textContent = '📋 コピー'; btn.classList.remove('copied'); }, 2000);
  } catch(e) {
    var sel = window.getSelection();
    var range = document.createRange();
    range.selectNodeContents(box);
    sel.removeAllRanges();
    sel.addRange(range);
  }
});
</script>
</body>
</html>
